model:
  default: MiniMax-M2.7
  provider: minimax
  base_url: https://api.minimax.io/anthropic
toolsets:
  - hermes-cli
skills:
  external_dirs:
    - /home/openclaw/.hermes/skills
    - /home/openclaw/Coding/badass-skills
agent:
  max_turns: 90
  tool_use_enforcement: auto
  reasoning_effort: high
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 3000
  user_char_limit: 1375
  provider: holographic
fallback_providers:
- provider: deepseek
  model: deepseek-chat
delegation:
  max_iterations: 90
  default_toolsets:
  - terminal
  - file
  - web
  - skills
terminal:
  timeout: 600
timezone: 'Europe/Madrid'
web:
  backend: firecrawl
